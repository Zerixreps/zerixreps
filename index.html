<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZERIX REPS</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0a0a0a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;

/* APPLE STYLE FADE-IN */
opacity:0;
animation:fadeIn 1.2s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* tło subtelne */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 50% 30%, rgba(255,255,255,0.06), transparent 60%);
z-index:-1;
}

/* MARQUEE */
.marquee{
position:absolute;
top:20px;
width:100%;
white-space:nowrap;
overflow:hidden;
opacity:0.08;
font-size:120px;
font-weight:900;
letter-spacing:10px;
}

.marquee span{
display:inline-block;
animation:scroll 18s linear infinite;
}

@keyframes scroll{
from{transform:translateX(100%);}
to{transform:translateX(-100%);}
}

/* kontener z animacją jak Apple cards */
.container{
text-align:center;
max-width:700px;
padding:30px;

/* slide + fade */
opacity:0;
transform:translateY(30px);
animation:slideUp 1s ease forwards;
animation-delay:0.3s;
}

@keyframes slideUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* logo */
.logo-img{
width:140px;
height:140px;
border-radius:18px;
object-fit:cover;
filter:grayscale(100%);
opacity:0.9;
margin-bottom:15px;
transition:0.3s;
}

.logo-img:hover{
transform:scale(1.05);
opacity:1;
}

/* tekst */
.title{
font-size:48px;
font-weight:900;
letter-spacing:6px;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
letter-spacing:3px;
opacity:0.6;
margin-bottom:40px;
}

/* przyciski */
.btn{
display:block;
margin:12px auto;
padding:14px;
width:80%;
max-width:380px;
border:1px solid rgba(255,255,255,0.15);
background:transparent;
color:#fff;
text-decoration:none;
font-size:14px;
letter-spacing:2px;
transition:0.3s;
opacity:0;
transform:translateY(10px);

/* wejście sekwencyjne */
animation:btnIn 0.8s ease forwards;
}

.btn:nth-child(1){animation-delay:0.6s;}
.btn:nth-child(2){animation-delay:0.75s;}
.btn:nth-child(3){animation-delay:0.9s;}

@keyframes btnIn{
to{
opacity:1;
transform:translateY(0);
}
}

.btn:hover{
background:#fff;
color:#000;
}

/* footer */
.footer{
position:absolute;
bottom:20px;
font-size:11px;
opacity:0.4;
letter-spacing:2px;
}
</style>
</head>

<body>

<div class="marquee">
<span>ZERIX REPS • STREET CULTURE • ZERIX REPS • STREET CULTURE •</span>
</div>

<div class="container">

<img src="foto.jpg" class="logo-img">

<div class="title">ZERIX</div>
<div class="subtitle">REPS • COMMUNITY • CULTURE</div>

<a class="btn" href="https://www.usfans.com/register?ref=BS2QSG" target="_blank">USFANS</a>
<a class="btn" href="https://discord.gg/c5z9m9VKxP" target="_blank">DISCORD</a>
<a class="btn" href="https://docs.google.com/spreadsheets/d/1GSb10WPdCQU6u1VtgPHUqVWWBPHa3yGqODf9SpNO9XI/edit" target="_blank">SPREADSHEET</a>

</div>

<div class="footer">
ZERIX REPS © 2026
</div>

</body>
</html>
