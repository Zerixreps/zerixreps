<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZERIX REPS</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
color:white;
text-align:center;
background:linear-gradient(135deg,#0a0a0a,#1a1a40,#4b00b5);
overflow-x:hidden;
}

/* delikatne „życie” w tle */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 20%, rgba(140,0,255,0.2), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,198,255,0.15), transparent 40%);
z-index:-1;
animation:moveBg 8s infinite alternate;
}

@keyframes moveBg{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.container{
max-width:800px;
margin:auto;
padding:25px;
}

.logo-img{
width:200px;
height:200px;
object-fit:cover;
border-radius:30px;
box-shadow:0 0 35px rgba(140,0,255,.6);
margin-top:30px;
transition:0.4s;
}

.logo-img:hover{
transform:scale(1.05);
}

.title{
font-size:50px;
font-weight:bold;
margin-top:15px;
text-shadow:0 0 20px #8a2be2;
}

.subtitle{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

/* przyciski */
.btn{
display:block;
margin:15px auto;
padding:16px;
width:85%;
max-width:500px;
background:linear-gradient(90deg,#7b2cff,#00c6ff);
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:15px;
box-shadow:0 0 18px rgba(0,198,255,.3);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* sekcja „karty” */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
gap:15px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
width:200px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.1);
}

.footer{
margin-top:50px;
opacity:0.6;
font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<!-- TWOJE LOGO -->
<img src="foto.jpg" class="logo-img">

<div class="title">ZERIX REPS</div>
<div class="subtitle">Sneakers • Reps • Community</div>

<!-- PRZYCISKI -->
<a class="btn" href="https://www.usfans.com/register?ref=BS2QSG" target="_blank">
🔥 Rejestracja USFANS
</a>

<a class="btn" href="https://discord.gg/c5z9m9VKxP" target="_blank">
💬 Discord
</a>

<a class="btn" href="https://docs.google.com/spreadsheets/d/1GSb10WPdCQU6u1VtgPHUqVWWBPHa3yGqODf9SpNO9XI/edit?gid=1553707851#gid=1553707851" target="_blank">
📦 Spreadsheet
</a>

<!-- KARTY INFORMACYJNE -->
<div class="cards">
<div class="card">🔥 Najlepsze repy</div>
<div class="card">💬 Aktywna społeczność</div>
<div class="card">📈 Nowe dropy</div>
</div>

<div class="footer">
ZERIX REPS © 2026
</div>

</div>

</body>
</html>
