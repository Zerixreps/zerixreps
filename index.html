<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZERIX REPS</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
color:white;
text-align:center;
background: radial-gradient(circle at top, #1b0033, #000010);
overflow-x:hidden;
}

/* miękkie światło */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(140,0,255,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,200,255,0.15), transparent 40%);
z-index:-1;
animation:glow 6s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* UKŁAD CENTRALNY */
.container{
max-width:900px;
margin:auto;
padding:40px;
display:flex;
flex-direction:column;
align-items:center;
}

/* LOGO */
.logo-img{
width:160px;
height:160px;
border-radius:20px;
object-fit:cover;
box-shadow:0 0 30px rgba(140,0,255,.6);
margin-bottom:10px;
}

/* TYTUŁ */
.title{
font-size:52px;
font-weight:900;
text-shadow:0 0 25px #a020ff;
}

.subtitle{
opacity:0.7;
margin-bottom:30px;
}

/* PRZYCISKI */
.btn{
padding:14px 20px;
margin:10px;
width:90%;
max-width:420px;
border-radius:14px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.15);
}

/* SEKCJA NARZĘDZI */
.tools{
margin-top:30px;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.tool-box{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:18px;
width:90%;
max-width:500px;
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.1);
}

input,select{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

/* TRACKER OUTPUT */
.output{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

/* FOOTER */
.footer{
margin-top:40px;
opacity:0.5;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<img src="foto.jpg" class="logo-img">

<div class="title">ZERIX REPS</div>
<div class="subtitle">Tools • Reps • Community</div>

<a class="btn" href="https://www.usfans.com/register?ref=BS2QSG" target="_blank">🔥 USFANS</a>
<a class="btn" href="https://discord.gg/c5z9m9VKxP" target="_blank">💬 Discord</a>
<a class="btn" href="https://docs.google.com/spreadsheets/d/1GSb10WPdCQU6u1VtgPHUqVWWBPHa3yGqODf9SpNO9XI/edit" target="_blank">📦 Spreadsheet</a>

<!-- NARZĘDZIA -->
<div class="tools">

<!-- KONWERTER LINKÓW -->
<div class="tool-box">
<h3>🔗 Konwerter linków</h3>

<select id="platform">
<option value="usfans">USFANS → Kakobay</option>
<option value="kakobay">Kakobay → USFANS</option>
</select>

<input id="linkInput" placeholder="Wklej link tutaj...">
<button class="btn" onclick="convertLink()">Konwertuj</button>

<div class="output" id="linkOut"></div>
</div>

<!-- TRACKER -->
<div class="tool-box">
<h3>📦 Tracker (symulator statusu)</h3>

<input id="trackInput" placeholder="Wklej status paczki (np. In transit)">
<button class="btn" onclick="track()">Sprawdź</button>

<div class="output" id="trackOut"></div>
</div>

</div>

<div class="footer">
ZERIX REPS © 2026
</div>

</div>

<script>

// 🔗 KONWERTER
function convertLink(){
let link = document.getElementById("linkInput").value;
let type = document.getElementById("platform").value;

let result = "";

if(type === "usfans"){
result = link.replace("usfans.com", "kakobay.com");
}else{
result = link.replace("kakobay.com", "usfans.com");
}

document.getElementById("linkOut").innerText =
"Przekierowanie: " + result;

// auto-redirect po 1.5s
setTimeout(()=>{
if(result.includes("http")) window.location.href = result;
},1500);
}

// 📦 TRACKER (FAKE LOGIC – tłumacz statusów)
function track(){
let text = document.getElementById("trackInput").value.toLowerCase();
let out = "";

if(text.includes("transit")){
out = "📦 Paczka w drodze między magazynami (transport międzynarodowy)";
}
else if(text.includes("warehouse")){
out = "🏭 Paczka w magazynie – przygotowanie do wysyłki";
}
else if(text.includes("custom")){
out = "🛃 Odprawa celna – sprawdzanie przesyłki przez służby";
}
else if(text.includes("delivered")){
out = "✅ Paczka dostarczona do lokalnego punktu odbioru";
}
else{
out = "ℹ️ Status nieznany – system nie ma danych, ale paczka nadal jest w procesie";
}

document.getElementById("trackOut").innerText = out;
}

</script>

</body>
</html>
