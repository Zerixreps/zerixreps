<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZERIX REPS</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
color:white;
text-align:center;
background:linear-gradient(135deg,#050505,#1a1a40,#6a00ff);
overflow-x:hidden;
}

/* tło z "lux logami" */
body::before{
content:"PRADA  LV  GUCCI  DIOR  BALENCIAGA  PRADA  LV  GUCCI";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
font-size:80px;
font-weight:bold;
color:rgba(255,255,255,0.03);
transform:rotate(-25deg);
animation:moveText 25s linear infinite;
white-space:wrap;
z-index:-2;
}

@keyframes moveText{
from{transform:translateY(0) rotate(-25deg);}
to{transform:translateY(-200px) rotate(-25deg);}
}

/* delikatne światła */
body::after{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 20%, rgba(140,0,255,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,200,255,0.15), transparent 40%);
z-index:-1;
animation:pulse 6s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.container{
max-width:850px;
margin:auto;
padding:30px;
backdrop-filter: blur(5px);
}

.logo-img{
width:180px;
height:180px;
object-fit:cover;
border-radius:25px;
box-shadow:0 0 40px rgba(160,0,255,.6);
margin-top:20px;
transition:0.4s;
}

.logo-img:hover{
transform:scale(1.07) rotate(2deg);
}

.title{
font-size:54px;
font-weight:900;
margin-top:10px;
letter-spacing:2px;
text-shadow:0 0 25px #a020ff;
}

.subtitle{
font-size:16px;
opacity:0.75;
margin-bottom:25px;
}

/* glass buttons */
.btn{
display:block;
margin:15px auto;
padding:16px;
width:85%;
max-width:500px;
background:rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.btn:hover{
transform:scale(1.06);
background:rgba(255,255,255,0.15);
box-shadow:0 0 25px rgba(140,0,255,0.4);
}

/* karty */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:35px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:18px;
width:220px;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
backdrop-filter: blur(8px);
}

.card:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.12);
}

.footer{
margin-top:50px;
opacity:0.5;
font-size:13px;
}

/* małe "cząstki" */
.particles span{
position:absolute;
display:block;
width:6px;
height:6px;
background:rgba(255,255,255,0.2);
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- cząsteczki -->
<div class="particles">
<span style="left:10%;animation-delay:0s;"></span>
<span style="left:30%;animation-delay:2s;"></span>
<span style="left:50%;animation-delay:4s;"></span>
<span style="left:70%;animation-delay:1s;"></span>
<span style="left:90%;animation-delay:3s;"></span>
</div>

<div class="container">

<img src="foto.jpg" class="logo-img">

<div class="title">ZERIX REPS</div>
<div class="subtitle">Sneakers • Reps • Community</div>

<a class="btn" href="https://www.usfans.com/register?ref=BS2QSG" target="_blank">🔥 Rejestracja USFANS</a>
<a class="btn" href="https://discord.gg/c5z9m9VKxP" target="_blank">💬 Discord</a>
<a class="btn" href="https://docs.google.com/spreadsheets/d/1GSb10WPdCQU6u1VtgPHUqVWWBPHa3yGqODf9SpNO9XI/edit?gid=1553707851#gid=1553707851" target="_blank">📦 Spreadsheet</a>

<div class="cards">
<div class="card">🔥 Premium jakość repów</div>
<div class="card">💬 Aktywna społeczność</div>
<div class="card">📈 Nowe dropy co tydzień</div>
</div>

<div class="footer">
ZERIX REPS © 2026
</div>

</div>

</body>
</html>
